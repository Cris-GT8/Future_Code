<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto | FutureCode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Mercado Pago SDK -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .product-detail-container {
            max-width: 1200px;
            margin: 120px auto 100px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
        }

        .preview-area {
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, #f8fafc, #eff6ff);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .tech-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 50px;
            font-size: 14px;
            color: #0891b2;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(34, 211, 238, 0.1);
        }

        .price-panel {
            padding: 30px;
            height: fit-content;
        }

        @media (max-width: 968px) {
            .product-detail-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <!-- Shared Nav -->
    <nav class="glass-panel glass-nav">
        <div class="logo">
            <h2 style="font-family: 'Outfit'; color: #1e293b; letter-spacing: -1px;">Future<span
                    style="color: var(--accent-blue);">Code</span></h2>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Inicio</a>
            <a href="marketplace.html">Marketplace</a>
            <a href="index.html#about">Nosotros</a>
        </div>
        <div class="nav-actions" style="display: flex; gap: 15px; align-items: center;">
            <div
                style="padding: 8px 15px; background: rgba(0,0,0,0.03); border-radius: 50px; display: flex; align-items: center; border: 1px solid rgba(0,0,0,0.05);">
                <input type="text" id="global-search" placeholder="Buscar..."
                    style="background: none; border: none; font-size: 14px; color: #1e293b; outline: none; width: 100px;">
            </div>
            <div id="account-btn"
                style="width: 40px; height: 40px; background: rgba(255,255,255,0.8); border-radius: 50%; border: 1px solid rgba(0,0,0,0.05); display: grid; place-items: center; cursor: pointer;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
        </div>
        <div class="burger-menu" id="burger">
            <div class="burger-line"></div>
            <div class="burger-line"></div>
            <div class="burger-line"></div>
        </div>
    </nav>

    <!-- Account/Auth Modal -->
    <div class="modal-overlay" id="account-modal">
        <div class="glass-panel modal-content" style="max-width: 450px;">
            <span class="modal-close" id="modal-close">✕</span>
            
            <div id="auth-tabs" style="display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 15px;">
                <h3 id="tab-login" style="cursor: pointer; color: var(--accent-blue); position: relative;">Iniciar Sesión</h3>
                <h3 id="tab-register" style="cursor: pointer; color: #64748b;">Crear Cuenta</h3>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" class="input-field" placeholder="tu@email.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" class="input-field" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Entrar</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display: none;">
                <div class="input-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" class="input-field" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="reg-email" class="input-field" placeholder="tu@email.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-password" class="input-field" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Registrarse</button>
            </form>

            <div id="auth-success-msg" style="display: none; text-align: center; padding: 20px;">
                <h3 style="color: var(--accent-blue);">¡Bienvenido, <span id="user-display-name"></span>!</h3>
                <p style="font-size: 14px; color: #64748b; margin-top: 10px;">Ya puedes comprar y acceder a demos.</p>
                <button class="btn-primary" id="btn-logout" style="margin-top: 20px; background: #fef2f2; color: #ef4444; box-shadow: none; border: 1px solid #fee2e2;">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <main class="product-detail-container">
        <div>
            <div class="preview-area glass-panel">
                <div style="text-align: center;">
                    <a href="demo.html" class="btn-primary" style="text-decoration: none;">Probar Demo en Vivo</a>
                </div>
            </div>
            <div style="margin-top: 40px;">
                <h2>Descripción del Producto</h2>
                <p>Componente profesional con efectos Liquid Glass.</p>
            </div>
        </div>
        <div class="price-panel glass-panel">
            <h1>NavBar de Cristal</h1>
            <span style="font-size: 2.5rem; font-weight: 800;">S/ 45.00</span>
            <button class="btn-primary" style="width: 100%; margin-top: 20px;">Comprar Ahora</button>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 FutureCode. Diseñado en Perú</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
